              </div>`;
          }).join('');
        },

        _renderGrid() {
          const container = document.getElementById('itv-grid');
          if (!container) return;

          const items = (this._data.interventions || [])
            .filter(i => i.gardeDate === this._currentDate)
            .sort((a, b) => (a.heure || '').localeCompare(b.heure || ''));

          this._renderSummary(items);

          // Agents on garde for this date
          const gardeEntries = (this._data.rotations.gardes || {})[this._currentDate] || [];
          const agents = gardeEntries
            .map(e => this._data.personnel.find(p => p.id === e.agentId))
            .filter(Boolean);

          // Build lookup: agentId -> [{slotIndex, label}]
          // Slot 0 = 07:30-08:00, slot 1 = 08:00-08:30, ..., slot 47 = 07:00-07:30
          function heureToMinutes(h) {
            const [hh, mm] = (h || '00:00').split(':').map(Number);
            return hh * 60 + mm;
          }
          function slotIndex(heure) {
            const m = heureToMinutes(heure);
            // Minutes from 07:30
            const base = 7 * 60 + 30;
            let delta = m - base;
            if (delta < 0) delta += 24 * 60;
            return Math.floor(delta / 30);
          }
          function slotLabel(idx) {
            const base = 7 * 60 + 30 + idx * 30;
            const hh = Math.floor((base % (24 * 60)) / 60).toString().padStart(2, '0');
            const mm = (base % 60).toString().padStart(2, '0');
            const end = base + 30;
            const ehh = Math.floor((end % (24 * 60)) / 60).toString().padStart(2, '0');
            const emm = (end % 60).toString().padStart(2, '0');
            return `${hh}:${mm}`;
          }

          // cellData[agentId][slotIndex] = array of strings
          const cellData = {};
          agents.forEach(a => { cellData[a.id] = {}; });

          items.forEach(itv => {
            if (!itv.heure) return;
            const si = slotIndex(itv.heure);
            (itv.vehicules || []).forEach(v => {
              (v.equipage || []).forEach(e => {
                if (!e.agentId || !cellData[e.agentId]) return;
                if (!cellData[e.agentId][si]) cellData[e.agentId][si] = [];
                cellData[e.agentId][si].push(`${v.nom || '?'} · ${e.poste}`);
              });
            });
          });

          const SLOTS = 48;

          if (!agents.length) {
            container.innerHTML = `<div class="flex items-center justify-center h-full text-gray-400 text-sm">Aucun agent en garde ce jour</div>`;
            return;
          }

          // Build table HTML
          // Sticky top-left cell + sticky header row + sticky left column
          const thStyle = 'min-w-[90px] max-w-[110px] text-center text-[10px] font-semibold text-gray-500 uppercase bg-white border-b border-r border-gray-100 px-1 py-2 sticky top-0 z-20';
          const th0Style = 'w-[64px] min-w-[64px] text-[10px] font-semibold text-gray-400 uppercase bg-white border-b border-r border-gray-200 px-2 py-2 sticky top-0 left-0 z-30';

          const headerCells = agents.map(a => {
            const name = `${a.nom || ''} ${(a.prenom || '')[0] || ''}.`;
            const role = (gardeEntries.find(e => e.agentId === a.id) || {}).role || '';
            return `<th class="${thStyle}">${this._esc(name)}<br><span class="text-gray-300 font-normal normal-case">${this._esc(role)}</span></th>`;
          }).join('');

          const rows = [];
          for (let si = 0; si < SLOTS; si++) {
            const label = slotLabel(si);
            const isHour = (7 * 60 + 30 + si * 30) % 60 === 0;
            const rowBg = si % 2 === 0 ? 'bg-white' : 'bg-gray-50/50';
            const tdTimeStyle = `w-[64px] min-w-[64px] text-[11px] font-mono text-gray-400 border-r border-b border-gray-100 px-2 py-1 sticky left-0 z-10 ${rowBg} ${isHour ? 'font-semibold text-gray-500' : ''}`;

            const dataCells = agents.map(a => {
              const entries = (cellData[a.id][si] || []);
              const cellContent = entries.map(txt => {
                const parts = txt.split(' · ');
                return `<span class="block text-[10px] leading-tight bg-sag-navy text-white rounded px-1 py-0.5 mb-0.5 font-semibold">${this._esc(txt)}</span>`;
              }).join('');
              return `<td class="text-center border-r border-b border-gray-100 px-1 py-1 ${rowBg} min-w-[90px] max-w-[110px]">${cellContent}</td>`;
            }).join('');

            rows.push(`<tr>
              <td class="${tdTimeStyle}">${label}</td>
              ${dataCells}
            </tr>`);
          }

          container.innerHTML = `
            <table class="border-collapse text-xs" style="table-layout:fixed">
              <thead>
                <tr>
                  <th class="${th0Style}">Heure</th>
                  ${headerCells}
                </tr>
              </thead>
              <tbody>
                ${rows.join('')}
              </tbody>
            </table>`;
        },

        _openModal(id) {
          let itv;
          if (id) {
            // Modifier : deep-clone pour ne pas muter avant save
            itv = JSON.parse(JSON.stringify(this._data.interventions.find(i => i.id === id)));
          } else {
            // Créer
            if (!this._currentDate) { Toast.show('Sélectionnez d\'abord une date de garde', 'error'); return; }
            itv = {
              id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
              gardeDate: this._currentDate,
              numero: this._nextNumeroFor(this._currentDate),
              heure: '',
              vehicules: [],
            };
          }
          this._editingItv = itv;

          document.getElementById('modal-itv-title').textContent = id ? 'Modifier l\'intervention' : 'Nouvelle intervention';

          // Bouton supprimer visible seulement en édition
          const delBtn = document.getElementById('modal-itv-delete-btn');
          if (id) {
            delBtn.classList.remove('hidden');
            delBtn.onclick = () => this._deleteFromModal(id);
          } else {
            delBtn.classList.add('hidden');
          }

          // OTP numéro
          const dateStr = (itv.gardeDate || '').replace(/-/g, '');
          document.getElementById('modal-itv-prefix').textContent = dateStr + '_';
          const digits = String(itv.numero || '').split('_')[1] || '0000';
          const d = digits.padStart(4,'0').slice(-4).split('');
          document.getElementById('modal-itv-otp').innerHTML = d.map((ch, i) => `
            <input type="text" inputmode="numeric" maxlength="1"
                   value="${ch}" placeholder="0"
                   data-otp-idx="${i}"
                   class="w-9 h-10 text-center text-base font-mono font-bold border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400 bg-white"
                   oninput="App.pages.interventions._otpInput(event)"
                   onkeydown="App.pages.interventions._otpKeydown(event)"
                   onfocus="setTimeout(()=>this.select(),0)"/>`).join('');

          // Heure
          document.getElementById('modal-itv-heure').value = itv.heure || '';
          document.getElementById('modal-itv-heure').oninput = e => { this._editingItv.heure = e.target.value; };

          // Type
          this._renderTypeSelector();

          // Picker véhicule
          document.getElementById('modal-itv-add-veh-btn').onclick = () => this._toggleModalPicker();
          this._renderModalPicker();

          // Véhicules
          this._renderModalVehicules();

          document.getElementById('modal-itv').classList.remove('hidden');
        },

        _closeModal() {
          this._editingItv = null;
          document.getElementById('modal-itv').classList.add('hidden');
          document.getElementById('modal-itv-picker').classList.add('hidden');
        },

        async _saveModal() {
          const itv = this._editingItv;
          if (!itv) return;
          // Commit OTP
          const inputs = document.querySelectorAll('#modal-itv-otp input');
          const digits = [...inputs].map(i => i.value || '0').join('').padStart(4,'0');
          itv.numero = (itv.gardeDate || '').replace(/-/g, '') + '_' + digits;

          const idx = this._data.interventions.findIndex(i => i.id === itv.id);
          if (idx >= 0) this._data.interventions[idx] = itv;
          else this._data.interventions.push(itv);

          await API.save('interventions.json', this._data.interventions);
          this._closeModal();
          this._renderCurrent();
          Toast.show('Intervention enregistrée');
        },

        _deleteFromModal(id) {
          if (!confirm('Supprimer cette intervention ?')) return;
          this._data.interventions = this._data.interventions.filter(i => i.id !== id);
          API.save('interventions.json', this._data.interventions);
          this._closeModal();
          this._renderCurrent();
          Toast.show('Intervention supprimée');
        },

        _renderTypeSelector() {
          const current = this._editingItv?.type || null;
          document.getElementById('modal-itv-types').innerHTML = this.TYPES.map(t => {
            const active = t.id === current;
            return `<button type="button"
                      onclick="App.pages.interventions._selectType('${t.id}')"
                      class="flex items-center gap-2 px-3 py-2 rounded-xl border-2 font-semibold text-sm transition-all
                             ${active ? `${t.color} ${t.text} border-transparent shadow-md scale-105` : 'bg-white border-gray-200 text-gray-600 hover:border-gray-300 hover:bg-gray-50'}">
                      <svg class="w-4 h-4 ${active ? t.text : 'text-gray-400'}" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        ${t.icon}
                      </svg>
                      ${t.label}
                    </button>`;
          }).join('');
        },

        _selectType(typeId) {
          if (!this._editingItv) return;
          this._editingItv.type = this._editingItv.type === typeId ? null : typeId;
          this._renderTypeSelector();
        },

        _renderModalPicker() {
          const picker = document.getElementById('modal-itv-picker');
          const byType = {};
          this._data.vehicules.filter(v => v.actif !== false).forEach(v => {
            (byType[v.type] = byType[v.type] || []).push(v);
          });
          picker.innerHTML = `<p class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">Choisir un véhicule</p>` +
            Object.entries(byType).map(([type, vehs]) => `
              <div class="mb-3 last:mb-0">
                <p class="text-xs text-gray-400 font-medium mb-1.5">${this._esc(type)}</p>
                <div class="flex flex-wrap gap-2">
                  ${vehs.map(v => `
                    <button onclick="App.pages.interventions._pickVehicule('${v.id}')"
                            class="px-3 py-1.5 text-sm font-semibold rounded-lg border border-gray-200 hover:border-blue-400 hover:bg-blue-50 hover:text-blue-700 transition-colors text-gray-700 bg-gray-50">
                      ${this._esc(v.nom)}
                    </button>`).join('')}
                </div>
              </div>`).join('');
        },

        _toggleModalPicker() {
          document.getElementById('modal-itv-picker').classList.toggle('hidden');
        },

        _renderModalVehicules() {
          const itv = this._editingItv;
          if (!itv) return;
          const gardeAgents = (this._data.rotations.gardes || {})[itv.gardeDate] || [];
          const agentsOnGarde = gardeAgents
            .map(ga => this._data.personnel.find(p => p.id === ga.agentId))
            .filter(Boolean)
            .sort((a, b) => a.nom.localeCompare(b.nom));

          const container = document.getElementById('modal-itv-vehicules');
          if (!container) return;
          if (!(itv.vehicules || []).length) {
            container.innerHTML = `<p class="text-xs text-gray-400 text-center py-4 border border-dashed border-gray-200 rounded-xl">Aucun véhicule — cliquez sur "Ajouter un véhicule"</p>`;
            return;
          }
          container.innerHTML = itv.vehicules.map(vInst => this._renderVehiculeBlock(itv, vInst, agentsOnGarde)).join('');
        },

        _nextNumero() { return this._nextNumeroFor(this._currentDate); },

        _nextNumeroFor(date) {
          const dateStr = (date || new Date().toISOString().slice(0, 10)).replace(/-/g, '');
          const prefix = dateStr + '_';
          const existing = (this._data.interventions || [])
            .map(i => i.numero || '')
            .filter(n => n.startsWith(prefix))
            .map(n => parseInt(n.slice(prefix.length), 10))
            .filter(n => !isNaN(n));
          const next = existing.length ? Math.max(...existing) + 1 : 1;
          return prefix + String(next).padStart(4, '0');
        },

        _renderVehiculeBlock(itv, vInst, agentsOnGarde) {
          const vDef   = this._data.vehicules.find(v => v.id == vInst.vehiculeId);
          const modes  = vDef?.modes || [];
          const modeId = vInst.modeId ?? (modes[0]?.id ?? null);
          const mode   = modes.find(m => m.id === modeId) || modes[0] || null;
          const piquets = mode?.piquets || [];

          const agentOptions = agentsOnGarde.map(a =>
            `<option value="${a.id}">${this._esc(a.grade + ' ' + a.nom + ' ' + a.prenom)}</option>`
          ).join('');

          // Onglets modes
          const modeTabs = modes.length > 1 ? `
            <div class="flex gap-1 px-4 pt-3 pb-0">
              ${modes.map(m => {
                const active = m.id === modeId;
                return `<button onclick="App.pages.interventions._setMode('${vInst.instanceId}',${m.id})"
                                class="px-3 py-1 text-xs font-semibold rounded-t-lg border border-b-0 transition-colors
                                       ${active ? 'bg-white border-gray-200 text-blue-600' : 'bg-gray-100 border-gray-100 text-gray-500 hover:text-gray-700'}">
                          ${this._esc(m.nom)}
                        </button>`;
              }).join('')}
            </div>` : '';

          // Lignes équipage : piquets d'abord, puis agents extra
          const piquet_rows = piquets.map((piquet, pidx) => {
            const eq = (vInst.equipage || []).find(e => e.poste === piquet.nom) || { agentId: '', poste: piquet.nom };
            const eqIdx = (vInst.equipage || []).findIndex(e => e.poste === piquet.nom);
            return `
              <tr class="border-b border-gray-50 last:border-0">
                <td class="py-2 pr-3 w-28">
                  <div class="flex items-center gap-1.5">
                    <span class="text-xs font-bold text-gray-700">${this._esc(piquet.nom)}</span>
                    ${piquet.obligatoire
                      ? `<span class="text-xs bg-red-100 text-red-600 font-semibold px-1.5 py-0.5 rounded">Requis</span>`
                      : `<span class="text-xs bg-gray-100 text-gray-400 font-medium px-1.5 py-0.5 rounded">Opt.</span>`}
                  </div>
                </td>
                <td class="py-2">
                  <select class="w-full border border-gray-200 rounded-lg px-2 py-1.5 text-xs focus:outline-none focus:ring-1 focus:ring-blue-400"
                          onchange="App.pages.interventions._updateEquipageByPoste('${vInst.instanceId}','${this._esc(piquet.nom)}',this.value)">
                    <option value="">— Agent —</option>
                    ${agentOptions.replace(`value="${eq.agentId}"`, `value="${eq.agentId}" selected`)}
                  </select>
                </td>
                <td class="py-2 pl-2 w-6">
                  ${eq.agentId ? `<button onclick="App.pages.interventions._updateEquipageByPoste('${vInst.instanceId}','${this._esc(piquet.nom)}','')"
                          class="text-gray-300 hover:text-red-500 transition-colors">
                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                  </button>` : ''}
                </td>
              </tr>`;
          }).join('');

          // Agents extra (poste libre, non lié à un piquet)
          const extraEquipage = (vInst.equipage || []).filter(e => !piquets.find(p => p.nom === e.poste));
          const extra_rows = extraEquipage.map((eq, xidx) => {
            const globalIdx = (vInst.equipage || []).indexOf(eq);
            const allPostes = [...new Set(piquets.map(p => p.nom))];
            const posteOpts = allPostes.map(p => `<option value="${this._esc(p)}">${this._esc(p)}</option>`).join('');
            return `
              <tr class="border-b border-gray-50 last:border-0 bg-blue-50/30">
                <td class="py-2 pr-3 w-28">
                  <input type="text" value="${this._esc(eq.poste)}" placeholder="Poste libre"
                         class="w-full border border-gray-200 rounded-lg px-2 py-1.5 text-xs focus:outline-none focus:ring-1 focus:ring-blue-400 bg-white"
                         oninput="App.pages.interventions._updateEquipage('${vInst.instanceId}',${globalIdx},'poste',this.value)"/>
                </td>
                <td class="py-2">
                  <select class="w-full border border-gray-200 rounded-lg px-2 py-1.5 text-xs focus:outline-none focus:ring-1 focus:ring-blue-400"
                          onchange="App.pages.interventions._updateEquipage('${vInst.instanceId}',${globalIdx},'agentId',this.value)">
                    <option value="">— Agent —</option>
                    ${agentOptions.replace(`value="${eq.agentId}"`, `value="${eq.agentId}" selected`)}
                  </select>
                </td>
                <td class="py-2 pl-2 w-6">
                  <button onclick="App.pages.interventions._removeEquipage('${vInst.instanceId}',${globalIdx})"
                          class="text-gray-300 hover:text-red-500 transition-colors">
                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                  </button>
                </td>
              </tr>`;
          }).join('');

          return `
            <div class="bg-white rounded-xl border border-gray-200 mb-3 overflow-hidden" id="vitv-${vInst.instanceId}">
              <!-- En-tête véhicule -->
              <div class="flex items-center gap-3 px-4 py-2.5 bg-sag-navy">
                <svg class="w-4 h-4 text-sag-gold shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M8 17a2 2 0 100-4 2 2 0 000 4zm8 0a2 2 0 100-4 2 2 0 000 4zM3 17V9l4-6h10l4 6v8M3 13h18"/>
                </svg>
                <span class="text-sm font-bold text-white flex-1">${this._esc(vDef?.nom || '—')}</span>
                <span class="text-xs text-sag-gold/80 font-medium">${this._esc(vDef?.type || '')}</span>
                <button onclick="App.pages.interventions._removeVehicule('${vInst.instanceId}')"
                        class="text-white/40 hover:text-red-400 transition-colors ml-2 shrink-0">
                  <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                  </svg>
                </button>
              </div>

              <!-- Onglets modes -->
              ${modeTabs}

              <!-- Tableau équipage -->
              <div class="px-4 pb-3 ${modes.length > 1 ? 'pt-3 border-t border-gray-200' : 'pt-3'}">
                ${piquets.length ? `
                <table class="w-full mb-2">
                  <thead>
                    <tr class="text-xs text-gray-400 uppercase tracking-wide border-b border-gray-100">
                      <th class="text-left pb-2 font-semibold w-28">Poste</th>
                      <th class="text-left pb-2 font-semibold">Agent</th>
                      <th class="w-6"></th>
                    </tr>
                  </thead>
                  <tbody>
                    ${piquet_rows}
                    ${extra_rows}
                  </tbody>
                </table>` : `<p class="text-xs text-gray-400 italic mb-2">Aucun piquet défini pour ce mode</p>`}
                <button onclick="App.pages.interventions._addExtraAgent('${vInst.instanceId}')"
                        class="text-xs text-blue-600 hover:text-blue-800 font-medium flex items-center gap-1 transition-colors">
                  <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
                  </svg>
                  Agent supplémentaire
                </button>
              </div>
            </div>`;
        },

        _otpInput(e) {
          const input = e.target;
          const idx   = parseInt(input.dataset.otpIdx, 10);
          const val   = input.value.replace(/\D/g, '').slice(-1);
          input.value = val;
          if (val) {
            const next = document.querySelector(`#modal-itv-otp [data-otp-idx="${idx + 1}"]`);
            if (next) next.focus();
          }
        },

        _otpKeydown(e) {
          const input = e.target;
          const idx   = parseInt(input.dataset.otpIdx, 10);
          if (e.key === 'Backspace' && !input.value) {
            const prev = document.querySelector(`#modal-itv-otp [data-otp-idx="${idx - 1}"]`);
            if (prev) { prev.value = ''; prev.focus(); }
          } else if (e.key === 'ArrowLeft') {
            document.querySelector(`#modal-itv-otp [data-otp-idx="${idx - 1}"]`)?.focus();
          } else if (e.key === 'ArrowRight') {
            document.querySelector(`#modal-itv-otp [data-otp-idx="${idx + 1}"]`)?.focus();
          }
        },

        _pickVehicule(vehiculeId) {
          const itv = this._editingItv;
          if (!itv) return;
          const vDef  = this._data.vehicules.find(v => v.id == vehiculeId);
          const mode  = vDef?.modes?.[0] || null;
          itv.vehicules = itv.vehicules || [];
          itv.vehicules.push({
            instanceId: Date.now().toString(36) + Math.random().toString(36).slice(2, 5),
            vehiculeId: Number(vehiculeId) || vehiculeId,
            nom: vDef?.nom || '',
            modeId: mode?.id ?? null,
            equipage: (mode?.piquets || []).map(p => ({ poste: p.nom, agentId: '' })),
          });
          document.getElementById('modal-itv-picker').classList.add('hidden');
          this._renderModalVehicules();
        },

        _removeVehicule(instanceId) {
          const itv = this._editingItv;
          if (!itv) return;
          itv.vehicules = (itv.vehicules || []).filter(v => v.instanceId !== instanceId);
          this._renderModalVehicules();
        },

        _setMode(instanceId, modeId) {
          const itv   = this._editingItv;
          const vInst = (itv?.vehicules || []).find(v => v.instanceId === instanceId);
          if (!vInst) return;
          const vDef  = this._data.vehicules.find(v => v.id == vInst.vehiculeId);
          const mode  = (vDef?.modes || []).find(m => m.id === modeId);
          if (!mode) return;
          vInst.modeId = modeId;
          const newEquipage = (mode.piquets || []).map(p => {
            const existing = vInst.equipage.find(e => e.poste === p.nom);
            return { poste: p.nom, agentId: existing?.agentId || '' };
          });
          const extras = vInst.equipage.filter(e => !(mode.piquets || []).find(p => p.nom === e.poste));
          vInst.equipage = [...newEquipage, ...extras];
          this._renderModalVehicules();
        },

        _updateEquipageByPoste(instanceId, poste, agentId) {
          const itv   = this._editingItv;
          const vInst = (itv?.vehicules || []).find(v => v.instanceId === instanceId);
          if (!vInst) return;
          const entry = vInst.equipage.find(e => e.poste === poste);
          if (entry) entry.agentId = agentId;
          else vInst.equipage.push({ poste, agentId });
        },

        _addExtraAgent(instanceId) {
          const itv   = this._editingItv;
          const vInst = (itv?.vehicules || []).find(v => v.instanceId === instanceId);
          if (!vInst) return;
          vInst.equipage.push({ poste: '', agentId: '' });
          this._renderModalVehicules();
        },

        _removeEquipage(instanceId, idx) {
          const itv   = this._editingItv;
          const vInst = (itv?.vehicules || []).find(v => v.instanceId === instanceId);
          if (!vInst) return;
          vInst.equipage.splice(idx, 1);
          this._renderModalVehicules();
        },

        _updateEquipage(instanceId, idx, field, value) {
          const itv   = this._editingItv;
          const vInst = (itv?.vehicules || []).find(v => v.instanceId === instanceId);
          if (!vInst || !vInst.equipage[idx]) return;
          vInst.equipage[idx][field] = value;
        },

        _esc(s) {
          return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        },
      },

      // ── Debug ──────────────────────────────────────────
      debug: {
        async init() {
          const container = document.getElementById('debug-container');
          if (container) await DebugView.render(container);
        }
      },

      // ── Paramètres ─────────────────────────────────────
      parametres: {

        async init() {
          // Chargement des données
          [App.data.vehicules, App.data.uv, App.data.equipes] = await Promise.all([
            API.get('vehicules.json'),
            API.get('uv.json'),
            API.get('equipes.json')
          ]);

          // Onglets
          const tabs  = document.querySelectorAll('.param-tab');
          const panels = document.querySelectorAll('.param-panel');
          const activate = (name) => {
            tabs.forEach(t => {
              const active = t.dataset.tab === name;
              t.classList.toggle('border-sag-gold', active);
              t.classList.toggle('text-sag-gold', active);
              t.classList.toggle('border-transparent', !active);
              t.classList.toggle('text-gray-400', !active);
            });
            panels.forEach(p => p.classList.toggle('hidden', p.id !== `tab-${name}`));
          };
          tabs.forEach(t => t.addEventListener('click', () => activate(t.dataset.tab)));
          activate('vehicules');

          this.veh.render();
          this.uv.render();
          this.eq.render();
        },

        // ─── Véhicules ──────────────────────────────────
        veh: {
          _modes: [],       // modes en cours d'édition
          _activeMode: 0,   // index du mode affiché

          render() {
            const list = App.data.vehicules || [];
            const el   = document.getElementById('veh-list');
            if (!list.length) {
              el.innerHTML = `<div class="bg-white rounded-xl p-10 text-center border border-dashed border-gray-200">
                <p class="text-gray-300 text-sm">Aucun véhicule — cliquez sur "Ajouter"</p></div>`;
              return;
            }
            el.innerHTML = list.map(v => {
              const modes = v.modes || [];
              const totalPiquets = modes.reduce((s, m) => s + (m.piquets||[]).length, 0);
              return `
              <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <!-- En-tête véhicule -->
                <div class="flex items-center gap-4 px-5 py-3.5">
                  <div class="w-9 h-9 rounded-lg bg-red-50 flex items-center justify-center shrink-0">
                    <svg class="w-5 h-5 text-sag-gold" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M8 17a2 2 0 100-4 2 2 0 000 4zm8 0a2 2 0 100-4 2 2 0 000 4zM3 17V9l4-6h10l4 6v8M3 13h18"/>
                    </svg>
                  </div>
                  <div class="flex-1 min-w-0">
                    <p class="font-semibold text-gray-800 text-sm">${v.nom}</p>
                    <p class="text-gray-400 text-xs">${v.type} · ${modes.length} mode(s) · ${totalPiquets} piquet(s) total</p>
                  </div>
                  <span class="px-2 py-0.5 rounded-full text-xs font-medium ${v.actif ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-400'}">
                    ${v.actif ? 'Actif' : 'Inactif'}
                  </span>
                  <button onclick="App.pages.parametres.veh.openEdit(${v.id})"
                          class="p-1.5 text-gray-300 hover:text-sag-gold rounded transition-colors">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                    </svg>
                  </button>
                  <button onclick="App.pages.parametres.veh.delete(${v.id})"
                          class="p-1.5 text-gray-300 hover:text-red-400 rounded transition-colors">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                    </svg>
                  </button>
                </div>
                <!-- Modes et piquets -->
                ${modes.length ? `
                <div class="border-t border-gray-50 divide-y divide-gray-50">
                  ${modes.map(m => {
                    const allUV = App.data.uv || [];
                    const obl = (m.piquets||[]).filter(p => p.obligatoire !== false);
                    const fac = (m.piquets||[]).filter(p => p.obligatoire === false);
                    const renderPiquet = p => {
                      const uvs = (p.uvRequises||[]).map(id => allUV.find(u=>u.id===id)).filter(Boolean);
                      const uvHtml = uvs.length
                        ? ` <span class="text-blue-400 font-mono text-[10px]">[${uvs.map(u=>u.code).join(', ')}]</span>`
                        : '';
                      return p.obligatoire !== false
                        ? `<span class="px-2 py-0.5 bg-gray-700 text-white rounded-full text-xs font-medium" title="Obligatoire">${p.nom}${uvHtml}</span>`
                        : `<span class="px-2 py-0.5 border border-dashed border-gray-300 text-gray-400 rounded-full text-xs" title="Facultatif">${p.nom}${uvHtml}</span>`;
                    };
                    return `
                    <div class="px-5 py-2.5">
                      <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1.5">${m.nom}</p>
                      <div class="flex flex-wrap gap-1.5 items-center">
                        ${obl.map(renderPiquet).join('')}
                        ${fac.map(renderPiquet).join('')}
                        ${obl.length || fac.length ? `<span class="ml-auto text-gray-300 text-xs shrink-0">${obl.length} obl.${fac.length ? ` · ${fac.length} fac.` : ''}</span>` : ''}
                      </div>
                    </div>`;
                  }).join('')}
                </div>` : ''}
              </div>`;
            }).join('');
          },

          _openModal(title, v) {
            document.getElementById('modal-veh-title').textContent = title;
            document.getElementById('veh-id').value      = v.id || '';
            document.getElementById('veh-nom').value     = v.nom || '';
            document.getElementById('veh-type').value    = v.type || 'VSAV';
            document.getElementById('veh-actif').checked = v.actif !== false;
            // Copie profonde des modes ; si ancien format (piquets directs), on migre à la volée
            if (v.modes) {
              this._modes = v.modes.map(m => ({ ...m, piquets: m.piquets.map(p => ({ ...p })) }));
            } else if (v.piquets) {
              this._modes = [{ id: Date.now(), nom: 'Standard', piquets: v.piquets.map(p => ({ ...p })) }];
            } else {
              this._modes = [{ id: Date.now(), nom: 'Standard', piquets: [] }];
            }
            this._activeMode = 0;
            this._renderModes();
            document.getElementById('modal-veh').classList.remove('hidden');
          },

          openAdd()    { this._openModal('Nouveau véhicule', {}); },
          openEdit(id) {
            const v = (App.data.vehicules||[]).find(x => x.id === id);
            if (v) this._openModal('Modifier le véhicule', v);
          },

          _renderModes() {
            const tabs = document.getElementById('mode-tabs');
            tabs.innerHTML = this._modes.map((m, i) => `
              <button onclick="App.pages.parametres.veh.switchMode(${i})"
                      class="px-3 py-1.5 rounded-lg text-xs font-semibold transition-colors
                             ${i === this._activeMode
                               ? 'bg-sag-navy text-white'
                               : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}">
                ${m.nom || `Mode ${i+1}`}
              </button>
            `).join('');

            const m = this._modes[this._activeMode];
            if (!m) return;
            document.getElementById('mode-nom-input').value = m.nom;
            // Cacher bouton suppression si dernier mode
            document.getElementById('mode-delete-btn').style.display =
              this._modes.length > 1 ? 'block' : 'none';
            this._renderPiquets();
          },

          switchMode(i) {
            this._activeMode = i;
            this._renderModes();
          },

          renameMode(val) {
            if (this._modes[this._activeMode]) {
              this._modes[this._activeMode].nom = val;
              // Mettre à jour juste le texte du tab sans re-render complet
              const btns = document.querySelectorAll('#mode-tabs button');
              if (btns[this._activeMode]) btns[this._activeMode].textContent = val || `Mode ${this._activeMode+1}`;
            }
          },

          addMode() {
            this._modes.push({ id: Date.now(), nom: 'Nouveau mode', piquets: [] });
            this._activeMode = this._modes.length - 1;
            this._renderModes();
            document.getElementById('mode-nom-input').focus();
            document.getElementById('mode-nom-input').select();
          },

          removeMode() {
            if (this._modes.length <= 1) return;
            if (!confirm(`Supprimer le mode "${this._modes[this._activeMode].nom}" ?`)) return;
            this._modes.splice(this._activeMode, 1);
            this._activeMode = Math.min(this._activeMode, this._modes.length - 1);
            this._renderModes();
          },

          _renderPiquets() {
            const m      = this._modes[this._activeMode];
            const list   = m ? (m.piquets || []) : [];
            const allUV  = App.data.uv || [];
            const emptyEl = document.getElementById('piquets-empty');
            emptyEl.classList.toggle('hidden', list.length > 0);
            const am = this._activeMode;
            document.getElementById('piquets-list').innerHTML = list.map((p, i) => {
              const obl         = p.obligatoire !== false;
              const uvRequises  = p.uvRequises || [];
              const assignedUVs = uvRequises.map(id => allUV.find(u => u.id === id)).filter(Boolean);
              const availableUVs = allUV.filter(u => !uvRequises.includes(u.id));
              return `
              <div class="border border-gray-100 rounded-lg p-2 space-y-1.5 bg-gray-50/60">
                <!-- Ligne 1 : nom + OBL/FAC + suppr -->
                <div class="flex items-center gap-2">
                  <input type="text" value="${p.nom}"
                         oninput="App.pages.parametres.veh._modes[${am}].piquets[${i}].nom=this.value"
                         placeholder="Nom du rôle…"
                         class="flex-1 px-2.5 py-1 rounded border border-gray-200 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-sag-gold"/>
                  <button onclick="App.pages.parametres.veh.toggleObligatoire(${i})"
                          title="${obl ? 'Obligatoire → cliquer pour rendre facultatif' : 'Facultatif → cliquer pour rendre obligatoire'}"
                          class="shrink-0 px-2 py-1 rounded text-xs font-semibold border transition-colors
                                 ${obl ? 'bg-gray-700 text-white border-gray-700 hover:bg-gray-500'
                                       : 'bg-white text-gray-400 border-dashed border-gray-300 hover:border-gray-400'}">
                    ${obl ? 'OBL' : 'FAC'}
                  </button>
                  <button onclick="App.pages.parametres.veh.removePiquet(${i})"
                          class="p-1 text-gray-300 hover:text-red-400 rounded transition-colors shrink-0">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                  </button>
                </div>
                <!-- Ligne 2 : UV requises -->
                <div class="flex flex-wrap gap-1 items-center pl-0.5 min-h-[22px]">
                  ${assignedUVs.map(u => `
                    <span class="inline-flex items-center gap-0.5 pl-2 pr-1 py-0.5 bg-blue-50 text-blue-700 border border-blue-100 rounded text-xs font-mono">
                      ${u.code}
                      <button onclick="App.pages.parametres.veh.removeUVfromPiquet(${i},${u.id})"
                              class="ml-0.5 text-blue-300 hover:text-red-400 leading-none font-bold text-sm transition-colors">×</button>
                    </span>
                  `).join('')}
                  ${availableUVs.length ? `
                  <select onchange="App.pages.parametres.veh.addUVtoPiquet(${i},this)"
                          class="text-xs px-1.5 py-0.5 rounded border border-dashed border-gray-300 text-gray-400 bg-white cursor-pointer focus:outline-none focus:ring-1 focus:ring-sag-gold max-w-[130px]">
                    <option value="">+ UV requise</option>
                    ${availableUVs.map(u => `<option value="${u.id}">${u.code} — ${u.libelle}</option>`).join('')}
                  </select>` : `<span class="text-gray-300 text-xs italic">toutes les UV assignées</span>`}
                </div>
              </div>`;
            }).join('');
          },

          addUVtoPiquet(piquetIdx, select) {
            const uvId = parseInt(select.value);
            if (!uvId) return;
            const p = this._modes[this._activeMode].piquets[piquetIdx];
            if (!p.uvRequises) p.uvRequises = [];
            if (!p.uvRequises.includes(uvId)) p.uvRequises.push(uvId);
            this._renderPiquets();
          },

          removeUVfromPiquet(piquetIdx, uvId) {
            const p = this._modes[this._activeMode].piquets[piquetIdx];
            if (!p.uvRequises) return;
            p.uvRequises = p.uvRequises.filter(id => id !== uvId);
            this._renderPiquets();
          },

          toggleObligatoire(i) {
            const p = this._modes[this._activeMode].piquets[i];
            p.obligatoire = p.obligatoire === false;
            this._renderPiquets();
          },

          addPiquet() {
            const m = this._modes[this._activeMode];
            if (!m) return;
            m.piquets.push({ id: Date.now(), nom: '', obligatoire: true, uvRequises: [] });
            this._renderPiquets();
            const inputs = document.querySelectorAll('#piquets-list input[type=text]');
            if (inputs.length) inputs[inputs.length - 1].focus();
          },

          removePiquet(i) {
            this._modes[this._activeMode].piquets.splice(i, 1);
            this._renderPiquets();
          },

          async save() {
            const nom = document.getElementById('veh-nom').value.trim();
            if (!nom) { Toast.show('Nom requis', 'err'); return; }
            if (!this._modes.length) { Toast.show('Au moins un mode requis', 'err'); return; }

            const entry = {
              id:    document.getElementById('veh-id').value
                       ? parseInt(document.getElementById('veh-id').value)
                       : Date.now(),
              nom,
              type:  document.getElementById('veh-type').value,
              actif: document.getElementById('veh-actif').checked,
              modes: this._modes.map(m => ({
                id:     m.id || Date.now(),
                nom:    m.nom.trim() || 'Standard',
                piquets: (m.piquets || [])
                  .filter(p => p.nom.trim())
                  .map((p, i) => ({
                    id:          p.id || i + 1,
                    nom:         p.nom.trim(),
                    obligatoire: p.obligatoire !== false,
                    uvRequises:  p.uvRequises || []
                  }))
              }))
            };

            const list = App.data.vehicules || [];
            const idx  = list.findIndex(v => v.id === entry.id);
            if (idx >= 0) list[idx] = entry; else list.push(entry);
            App.data.vehicules = list;

            await API.save('vehicules.json', list);
            document.getElementById('modal-veh').classList.add('hidden');
            this.render();
            Toast.show('Véhicule enregistré');
          },

          async delete(id) {
            if (!confirm('Supprimer ce véhicule ?')) return;
            App.data.vehicules = (App.data.vehicules || []).filter(v => v.id !== id);
            await API.save('vehicules.json', App.data.vehicules);
            this.render();
            Toast.show('Véhicule supprimé');
          }
        },

        // ─── UV ─────────────────────────────────────────
        uv: {
          render() {
            const list = App.data.uv || [];
            const tbody = document.getElementById('uv-list');
            if (!list.length) {
              tbody.innerHTML = `<tr><td colspan="3" class="text-center py-8 text-gray-300">Aucune UV</td></tr>`;
              return;
            }
            tbody.innerHTML = list.map(u => `
              <tr class="border-b border-gray-50 hover:bg-gray-50 transition-colors">
                <td class="px-4 py-3">
                  <span class="px-2.5 py-0.5 bg-blue-50 text-blue-700 rounded font-mono text-xs font-semibold">${u.code}</span>
                </td>
                <td class="px-4 py-3 text-gray-700">${u.libelle}</td>
                <td class="px-4 py-3">
                  <div class="flex items-center gap-1 justify-end">
                    <button onclick="App.pages.parametres.uv.openEdit(${u.id})"
                            class="p-1.5 text-gray-300 hover:text-sag-gold rounded transition-colors">
                      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                      </svg>
                    </button>
                    <button onclick="App.pages.parametres.uv.delete(${u.id})"
                            class="p-1.5 text-gray-300 hover:text-red-400 rounded transition-colors">
                      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                      </svg>
                    </button>
                  </div>
                </td>
              </tr>
            `).join('');
          },

          openAdd() {
            document.getElementById('modal-uv-title').textContent = 'Nouvelle UV';
            document.getElementById('uv-id').value = '';
            document.getElementById('uv-code').value = '';
            document.getElementById('uv-libelle').value = '';
            document.getElementById('modal-uv').classList.remove('hidden');
          },

          openEdit(id) {
            const u = (App.data.uv||[]).find(x => x.id === id);
            if (!u) return;
            document.getElementById('modal-uv-title').textContent = 'Modifier UV';
            document.getElementById('uv-id').value      = u.id;
            document.getElementById('uv-code').value    = u.code;
            document.getElementById('uv-libelle').value = u.libelle;
            document.getElementById('modal-uv').classList.remove('hidden');
          },

          async save() {
            const code    = document.getElementById('uv-code').value.trim().toUpperCase();
            const libelle = document.getElementById('uv-libelle').value.trim();
            if (!code || !libelle) { Toast.show('Code et libellé requis', 'err'); return; }

            const entry = {
              id:      document.getElementById('uv-id').value
                         ? parseInt(document.getElementById('uv-id').value)
                         : Date.now(),
              code, libelle
            };
            const list = App.data.uv || [];
            const idx  = list.findIndex(u => u.id === entry.id);
            if (idx >= 0) list[idx] = entry; else list.push(entry);
            App.data.uv = list;

            await API.save('uv.json', list);
            document.getElementById('modal-uv').classList.add('hidden');
            this.render();
            Toast.show('UV enregistrée');
          },

          async delete(id) {
            if (!confirm('Supprimer cette UV ?')) return;
            App.data.uv = (App.data.uv||[]).filter(u => u.id !== id);
            await API.save('uv.json', App.data.uv);
            this.render();
            Toast.show('UV supprimée');
          }
        },

        // ─── Équipes ────────────────────────────────────
        eq: {
          render() {
            const list  = App.data.equipes || [];
            const tbody = document.getElementById('eq-list');
            if (!list.length) {
              tbody.innerHTML = `<tr><td colspan="4" class="text-center py-8 text-gray-300">Aucune équipe</td></tr>`;
              return;
            }
            tbody.innerHTML = list.map(e => `
              <tr class="border-b border-gray-50 hover:bg-gray-50 transition-colors">
                <td class="px-4 py-3">
                  <span class="px-2.5 py-0.5 rounded-full text-xs font-bold text-white"
                        style="background:${e.couleur}">${e.code}</span>
                </td>
                <td class="px-4 py-3 text-gray-700 font-medium">${e.nom}</td>
                <td class="px-4 py-3">
                  <div class="flex items-center gap-2">
                    <span class="w-5 h-5 rounded-full inline-block border border-gray-200"
                          style="background:${e.couleur}"></span>
                    <span class="text-gray-400 text-xs font-mono">${e.couleur}</span>
                  </div>
                </td>
                <td class="px-4 py-3">
                  <div class="flex items-center gap-1 justify-end">
                    <button onclick="App.pages.parametres.eq.openEdit(${e.id})"
                            class="p-1.5 text-gray-300 hover:text-sag-gold rounded transition-colors">
                      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                      </svg>
                    </button>
                    <button onclick="App.pages.parametres.eq.delete(${e.id})"
                            class="p-1.5 text-gray-300 hover:text-red-400 rounded transition-colors">
                      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                      </svg>
                    </button>
                  </div>
                </td>
              </tr>
            `).join('');
          },

          openAdd() {
            document.getElementById('modal-eq-title').textContent = 'Nouvelle équipe';
            document.getElementById('eq-id').value     = '';
            document.getElementById('eq-code').value   = '';
            document.getElementById('eq-nom').value    = '';
            document.getElementById('eq-couleur').value = '#1A3A6B';
            document.getElementById('modal-eq').classList.remove('hidden');
          },

          openEdit(id) {
            const e = (App.data.equipes||[]).find(x => x.id === id);
            if (!e) return;
            document.getElementById('modal-eq-title').textContent = 'Modifier l\'équipe';
            document.getElementById('eq-id').value      = e.id;
            document.getElementById('eq-code').value    = e.code;
            document.getElementById('eq-nom').value     = e.nom;
            document.getElementById('eq-couleur').value = e.couleur || '#1A3A6B';
            document.getElementById('modal-eq').classList.remove('hidden');
          },

          async save() {
            const code = document.getElementById('eq-code').value.trim().toUpperCase();
            const nom  = document.getElementById('eq-nom').value.trim();
            if (!code || !nom) { Toast.show('Code et nom requis', 'err'); return; }

            const entry = {
              id:      document.getElementById('eq-id').value
                         ? parseInt(document.getElementById('eq-id').value)
                         : Date.now(),
              code, nom,
              couleur: document.getElementById('eq-couleur').value
            };
            const list = App.data.equipes || [];
            const idx  = list.findIndex(e => e.id === entry.id);
            if (idx >= 0) list[idx] = entry; else list.push(entry);
            App.data.equipes = list;

            await API.save('equipes.json', list);
            document.getElementById('modal-eq').classList.add('hidden');
            this.render();
            Toast.show('Équipe enregistrée');
          },

          async delete(id) {
            if (!confirm('Supprimer cette équipe ?')) return;
            App.data.equipes = (App.data.equipes||[]).filter(e => e.id !== id);
            await API.save('equipes.json', App.data.equipes);
            this.render();
            Toast.show('Équipe supprimée');
          }
        }
      }
    },

    updateGroupeBadge() {
      const grp = groupeToday(this.data.rotations);
      const el = document.getElementById('groupe-garde');
      if (el) {
        el.textContent = grp || '—';
        el.className = `px-2.5 py-0.5 rounded-full text-xs font-bold tracking-wide ${grp ? `badge-${grp}` : 'bg-gray-100 text-gray-400'}`;
      }
    }
  };

  // ─── Bootstrap ───────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', async () => {

    // Date topbar
    document.getElementById('current-date').textContent =
      new Date().toLocaleDateString('fr-FR', { day:'numeric', month:'short', year:'numeric' });

    // Chargement des données
    await App.loadAll();
    App.updateGroupeBadge();

    // Navigation par liens
    document.body.addEventListener('click', e => {
      const link = e.target.closest('[data-page]');
      if (!link) return;
      e.preventDefault();
      App.navigate(link.dataset.page);
    });

    // Toggle sidebar
    document.getElementById('btn-toggle-sidebar').addEventListener('click', () => {
      document.body.classList.toggle('collapsed');
    });

    // Page initiale
    App.navigate('dashboard');
  });
  </script>
  <script src="debug.js"></script>
</body>
</html>
