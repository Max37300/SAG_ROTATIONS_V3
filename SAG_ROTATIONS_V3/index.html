<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAG Rotations V3 — Sud Agglo</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sag: {
              navy:    '#0B1629',
              navylt:  '#132040',
              gold:    '#C0392B',
              goldlt:  '#E74C3C',
              red:     '#C0392B',
              redlt:   '#E74C3C',
              blue:    '#1A3A6B',
              border:  '#1E2D47',
            }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    * { box-sizing: border-box; }

    body { font-family: 'Inter', system-ui, sans-serif; }

    /* Scrollbar sidebar */
    #sidebar::-webkit-scrollbar { width: 4px; }
    #sidebar::-webkit-scrollbar-track { background: transparent; }
    #sidebar::-webkit-scrollbar-thumb { background: #1E2D47; border-radius: 2px; }

    /* Scrollbar main */
    #main-content::-webkit-scrollbar { width: 6px; }
    #main-content::-webkit-scrollbar-track { background: #f1f5f9; }
    #main-content::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

    /* Nav active pulse */
    .nav-item.active .nav-indicator {
      opacity: 1;
    }

    /* Page transition */
    .page { animation: fadeIn 0.15s ease; overflow-y: auto; padding: 1.5rem; flex: 1; min-height: 0; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Badge groupe */
    .badge-A { background: #1A3A6B; color: #fff; }
    .badge-B { background: #C0392B; color: #fff; }
    .badge-C { background: #27AE60; color: #fff; }
    .badge-D { background: #8E44AD; color: #fff; }

    /* Sidebar collapse */
    #sidebar { transition: width 0.25s ease; }
    body.collapsed #sidebar { width: 4.5rem; }
    body.collapsed .nav-label,
    body.collapsed .sidebar-footer-text { display: none; }
    body.collapsed .nav-item { justify-content: center; padding-left: 0; padding-right: 0; }
    body.collapsed .nav-indicator { display: none; }

    /* UV catégories dans le tableau */
    .uv-cat { position: relative; display: inline-flex; align-items: center; gap: 3px; }
    .uv-cat-badge {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 2px 7px; border-radius: 9999px;
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.03em;
      cursor: default;
    }
    .uv-tooltip {
      display: none;
      position: absolute; bottom: calc(100% + 6px); left: 0;
      background: #1e293b; color: #fff;
      border-radius: 8px; padding: 8px 10px;
      font-size: 0.7rem; white-space: nowrap;
      z-index: 50; box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      pointer-events: none; min-width: 120px;
    }
    .uv-tooltip::after {
      content: ''; position: absolute; top: 100%; left: 14px;
      border: 5px solid transparent; border-top-color: #1e293b;
    }
    .uv-cat:hover .uv-tooltip { display: block; }

    /* Pills toggle (fonctions / UV) */
    .pill-tag {
      display: inline-flex;
      align-items: center;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
      border: 1.5px solid #e2e8f0;
      background: #f8fafc;
      color: #64748b;
      cursor: pointer;
      transition: all 0.15s ease;
      user-select: none;
      letter-spacing: 0.02em;
    }
    .pill-tag:hover {
      border-color: #C0392B;
      color: #C0392B;
      background: #fff5f5;
    }
    .pill-tag.active {
      background: #C0392B;
      border-color: #C0392B;
      color: #fff;
      box-shadow: 0 1px 4px rgba(192,57,43,0.25);
    }

    /* Toast */
    #toast {
      transition: opacity 0.3s, transform 0.3s;
    }
    #toast.hidden { opacity: 0; transform: translateY(10px); pointer-events: none; }
  </style>
</head>

<body class="bg-gray-100 flex h-screen overflow-hidden text-sm">

  <!-- DASHBOARD -->

  <!-- PLANNING -->
  <template id="tpl-planning">
    <div class="page flex gap-5 items-start" style="align-items:stretch">

      <!-- ── Colonne gauche : calendrier ── -->
      <div class="flex flex-col gap-3 shrink-0 w-80">

        <!-- Header + légende -->
        <div>
          <h1 class="text-xl font-bold text-gray-800">Planning des gardes</h1>
          <div class="flex items-center gap-2 flex-wrap mt-2">
            <span class="flex items-center gap-1.5 text-xs font-semibold text-gray-500"><span class="inline-block w-3 h-3 rounded-full bg-gray-300"></span>Aucun agent</span>
            <span class="flex items-center gap-1.5 text-xs font-semibold text-gray-500"><span class="inline-block w-3 h-3 rounded-full bg-orange-400"></span>Agents affectés</span>
            <span class="flex items-center gap-1.5 text-xs font-semibold text-gray-500"><span class="inline-block w-3 h-3 rounded-full border-2 border-red-500 bg-white"></span>Aujourd'hui</span>
          </div>
        </div>

        <!-- Sélecteur mois -->
        <div class="flex items-center gap-2">
          <button id="prev-month" class="p-1.5 rounded-lg border border-gray-200 hover:bg-gray-100 transition-colors text-gray-500">

          <span id="mois-label" class="flex-1 text-center font-semibold text-gray-700 text-sm capitalize"></span>
          <button id="next-month" class="p-1.5 rounded-lg border border-gray-200 hover:bg-gray-100 transition-colors text-gray-500">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
          </button>
        </div>

        <!-- Calendrier -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
          <div id="calendrier-planning"></div>
        </div>
      </div>

  <!-- ═══════════════════════════════════════════════════════

  <script>
  // ─── API ────────────────────────────────────────────────
  const API = {
    async get(file) {
      const r = await fetch(`/api/data/${file}`);
      if (!r.ok) throw new Error(`Erreur lecture ${file}`);
      return r.json();
    },
    async save(file, data) {
      const r = await fetch(`/api/data/${file}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      if (!r.ok) throw new Error(`Erreur écriture ${file}`);
      return r.json();
    },
    async files() {
      const r = await fetch('/api/files');
      return (await r.json()).files;
    }
  };

  // ─── Toast ───────────────────────────────────────────────
  const Toast = {
    _t: null,
    show(msg, type = 'ok') {
      const el = document.getElementById('toast');
      const ico = document.getElementById('toast-icon');
      const txt = document.getElementById('toast-msg');
      ico.textContent = type === 'ok' ? '✓' : '⚠';
      ico.className = `text-lg ${type === 'ok' ? 'text-green-500' : 'text-red-500'}`;
      txt.textContent = msg;
      el.classList.remove('hidden');
      clearTimeout(this._t);
      this._t = setTimeout(() => el.classList.add('hidden'), 3000);
    }
  };

  // ─── Utilitaires ─────────────────────────────────────────
  const MOIS = ['Janvier','Février','Mars','Avril','Mai','Juin',
                'Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const JOURS = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];

  const GRADE_IMG = {
    'Sapeur 2ème classe':  'SA2',
    'Sapeur 1ère classe':  'SA1',
    'Caporal':             'CPL',
    'Caporal-chef':        'CCH',
    'Sergent':             'SGT',
    'Sergent-chef':        'SCH',
    'Adjudant':            'ADJ',
    'Adjudant-chef':       'ADC',
    'Lieutenant':          'LTN',
    'Capitaine':           'CNE',
    'Commandant':          'CDT',
    'Lieutenant-colonel':  'LCL',
    'Colonel':             'COL',
  };

  function gradeImg(grade, size = 28) {
    const key = GRADE_IMG[grade];
    if (!key) return '';
    return `<img src="assets/grades/${key}.webp" alt="${grade}"
                 title="${grade}"
                 style="width:${size}px;height:${size}px;object-fit:contain"
                 onerror="this.style.display='none'"/>`;
  }

  const UV_CATS = [
    { key: 'EQ',   label: 'EQ',   bg: '#dbeafe', color: '#1d4ed8' },
    { key: 'CE',   label: 'CE',   bg: '#fef9c3', color: '#92400e' },
    { key: 'CA',   label: 'CA',   bg: '#dcfce7', color: '#15803d' },
    { key: 'COND', label: 'COND', bg: '#ede9fe', color: '#6d28d9' },
    { key: 'COD',  label: 'COD',  bg: '#ffedd5', color: '#c2410c' },
    { key: 'FDF',  label: 'FDF',  bg: '#fce7f3', color: '#9d174d' },
  ];

  function renderUV(uvList) {
    if (!uvList || !uvList.length) return '<span class="text-gray-300 text-xs">—</span>';
    const groups = {};
    uvList.forEach(u => {
      const cat = UV_CATS.find(c => u.startsWith(c.key));
      const k = cat ? cat.key : 'AUTRE';
      if (!groups[k]) groups[k] = [];
      groups[k].push(u);
    });
    return Object.entries(groups).map(([k, items]) => {
      const cat = UV_CATS.find(c => c.key === k) || { bg: '#f1f5f9', color: '#475569' };
      const tooltip = items.join('<br>');
      return `<span class="uv-cat">
        <span class="uv-cat-badge" style="background:${cat.bg};color:${cat.color}">
          ${k}<span style="opacity:0.6;font-weight:400"> ×${items.length}</span>
        </span>
        <span class="uv-tooltip">${items.join('<br>')}</span>
      </span>`;
    }).join('');
  }

  function badgeGroupe(g) {
    return `<span class="badge-${g} px-2 py-0.5 rounded-full text-xs font-bold">${g}</span>`;
  }

  function formatDate(d) {
    return new Date(d).toLocaleDateString('fr-FR', { day:'2-digit', month:'2-digit', year:'numeric' });
  }

  function groupeToday(rotations) {
    const today = new Date().toISOString().slice(0, 10);
    const entries = (rotations.rotations || [])
      .filter(r => r.date <= today)
      .sort((a, b) => b.date.localeCompare(a.date));
    return entries.length ? entries[0].groupe : null;
  }

  // ─── Constantes garde ────────────────────────────────────
  const GARDE_TYPES = [
    { val: 'G24', bg: '#0B1629', color: '#fff' },
    { val: 'GJ',  bg: '#d97706', color: '#fff' },
    { val: 'GN',  bg: '#6d28d9', color: '#fff' },
    { val: 'GJ1', bg: '#059669', color: '#fff' },
    { val: 'GJ2', bg: '#0891b2', color: '#fff' },
  ];
  const GARDE_ROLES = ['SOG', 'STAT', 'EAP', 'BNSSA'];

  function gardeTypeMeta(val) {
    return GARDE_TYPES.find(t => t.val === val) || { bg: '#64748b', color: '#fff' };
  }

  // ─── Calendrier miniature (dashboard) ────────────────────
  function buildCalendrier(year, month, rotations) {
    const firstDay = new Date(year, month, 1);
    const lastDay  = new Date(year, month + 1, 0);
    let startDow = (firstDay.getDay() + 6) % 7;

    const byDate = {};
    (rotations.rotations || []).forEach(r => { byDate[r.date] = r.groupe; });

    let html = `<div class="p-4">`;
    html += `<div class="grid grid-cols-7 mb-1">`;
    JOURS.forEach(j => {
      html += `<div class="text-center text-xs font-medium text-gray-400 py-1">${j}</div>`;
    });
    html += `</div><div class="grid grid-cols-7 gap-0.5">`;

    for (let i = 0; i < startDow; i++) html += `<div></div>`;

    const today = new Date().toISOString().slice(0, 10);

    for (let d = 1; d <= lastDay.getDate(); d++) {
      const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const groupe  = byDate[dateStr];
      const isToday = dateStr === today;
      const bgColor = groupe
        ? groupe === 'A' ? 'bg-blue-600 text-white'
        : groupe === 'B' ? 'bg-red-600 text-white'
        : groupe === 'C' ? 'bg-green-600 text-white'
        : 'bg-purple-600 text-white'
        : isToday ? 'bg-sag-gold text-white'
        : 'hover:bg-gray-100 text-gray-700';

      html += `<div class="flex flex-col items-center justify-center rounded-lg p-1 text-xs font-medium ${bgColor} ${isToday ? 'ring-2 ring-sag-gold ring-offset-1' : ''}">
                <span>${d}</span>
                ${groupe ? `<span class="text-[9px] opacity-80 leading-none">${groupe}</span>` : ''}
              </div>`;
    }
    html += `</div></div>`;
    return html;
  }

  // ─── Calendrier planning (page planning) ─────────────────
  function buildCalendrierPlanning(year, month, gardes) {
    const firstDay = new Date(year, month, 1);
    const lastDay  = new Date(year, month + 1, 0);
    let startDow   = (firstDay.getDay() + 6) % 7;
    // Avant 07h30 → la garde active est celle de la veille
    const now = new Date();
    const activeDate = (now.getHours() < 7 || (now.getHours() === 7 && now.getMinutes() < 30))
      ? new Date(now.getTime() - 86400000)
      : now;
    const today = activeDate.toISOString().slice(0, 10);

    let html = `<div class="p-3">`;
    html += `<div class="grid grid-cols-7 mb-1">`;
    JOURS.forEach(j => {
      html += `<div class="text-center text-xs font-medium text-gray-400 py-1">${j}</div>`;
    });
    html += `</div><div class="grid grid-cols-7 gap-1">`;

    for (let i = 0; i < startDow; i++) html += `<div></div>`;

    for (let d = 1; d <= lastDay.getDate(); d++) {
      const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const aff     = gardes[dateStr] || [];
      const isToday = dateStr === today;

      const hasMissions = aff.length > 0;

      html += `<div onclick="App.pages.planning.openDay('${dateStr}')"
                   data-datestr="${dateStr}"
                   class="rounded-lg border cursor-pointer transition-all min-h-[64px] p-1.5 flex flex-col
                          ${isToday ? 'border-2 border-red-500' : 'border border-transparent'}
                          ${hasMissions ? 'bg-orange-400' : 'bg-gray-100 hover:bg-gray-200'}">
                <span class="text-xs font-semibold ${hasMissions ? 'text-white' : 'text-gray-400'}">${d}</span>
                ${hasMissions ? `<span class="text-[9px] text-white/80 mt-auto">${aff.length} ag.</span>` : ''}
              </div>`;
    }
    html += `</div></div>`;
    return html;
  }

  // ─── Pages ───────────────────────────────────────────────
  const App = {
    currentPage: null,
    data: { personnel: [], rotations: {}, config: {}, vehicules: [], uv: [], equipes: [] },

    // Chargement initial des données
    async loadAll() {
      try {
        [this.data.personnel, this.data.rotations, this.data.config,
         this.data.uv, this.data.equipes] = await Promise.all([
          API.get('personnel.json'),
          API.get('rotations.json'),
          API.get('config.json'),
          API.get('uv.json'),
          API.get('equipes.json')
        ]);
      } catch(e) {
        console.warn('Chargement partiel :', e.message);
      }
    },

    navigate(page) {
      // Met à jour la nav
      document.querySelectorAll('.nav-item').forEach(el => {
        el.classList.remove('active', 'text-white');
        el.classList.add('text-gray-300');
        el.querySelector('.nav-indicator').style.opacity = '0';
      });
      const link = document.querySelector(`.nav-item[data-page="${page}"]`);
      if (link) {
        link.classList.add('active', 'text-white');
        link.classList.remove('text-gray-300');
        link.querySelector('.nav-indicator').style.opacity = '1';
      }

      // Titre
      const titles = {
        dashboard: 'Tableau de bord',
        planning: 'Planning',
        personnel: 'Ressources humaines',
        vehicules: 'Véhicules',
        statistiques: 'Statistiques',
        parametres: 'Paramètres',
        interventions: 'Interventions',
        debug: 'Debug'
      };
      document.getElementById('page-title').textContent = titles[page] || page;

      // Clone template
      const tpl = document.getElementById(`tpl-${page}`);
      if (!tpl) return;
      const content = document.getElementById('page-content');
      content.innerHTML = '';
      content.appendChild(tpl.content.cloneNode(true));

      this.currentPage = page;
      if (this.pages[page]?.init) this.pages[page].init();
    },

    pages: {

      // ── Dashboard ──────────────────────────────────────
      dashboard: {
        async init() {
          const { personnel, rotations, config } = App.data;

          document.getElementById('db-date').textContent =
            new Date().toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

          document.getElementById('kpi-personnel').textContent = personnel.filter(p => p.actif).length;
          document.getElementById('kpi-rotations').textContent = (rotations.rotations || []).length;
          document.getElementById('kpi-centre').textContent = config.centre || 'SAG';

          const grp = groupeToday(rotations);
          document.getElementById('kpi-groupe').textContent = grp ? `Groupe ${grp}` : 'Non planifié';

          // Mini calendrier
          const now = new Date();
          document.getElementById('mini-calendrier').innerHTML =
            buildCalendrier(now.getFullYear(), now.getMonth(), rotations);

          // Personnel en garde
          const pgEl = document.getElementById('personnel-garde');
          const gardePersons = grp ? personnel.filter(p => p.groupe === grp && p.actif) : [];
          if (!gardePersons.length) {
            pgEl.innerHTML = `<p class="text-gray-300 text-xs text-center py-4">Aucun personnel en garde défini</p>`;
          } else {
            pgEl.innerHTML = gardePersons.map(p => `
              <div class="flex items-center gap-3 py-1.5 border-b border-gray-50 last:border-0">
                <div class="w-7 h-7 rounded-full bg-sag-navy flex items-center justify-center text-sag-gold text-xs font-bold shrink-0">
                  ${p.prenom[0]}${p.nom[0]}
                </div>
                <div class="min-w-0">
                  <p class="text-sm font-medium text-gray-700 truncate">${p.grade} ${p.nom}</p>
                  <p class="text-xs text-gray-400">${(p.specialites || []).join(', ')}</p>
                </div>
              </div>
            `).join('');
          }
        }
      },

      // ── Planning ───────────────────────────────────────
      planning: {
        year:  new Date().getFullYear(),
        month: new Date().getMonth(),
        _currentDay: null,

        _activeDate() {
          const now = new Date();
          const d = (now.getHours() < 7 || (now.getHours() === 7 && now.getMinutes() < 30))
            ? new Date(now.getTime() - 86400000) : now;
          return d.toISOString().slice(0, 10);
        },

        init() {
          const active = this._activeDate();
          const d = new Date(active + 'T12:00:00');
          this.year  = d.getFullYear();
          this.month = d.getMonth();
          this.render();
          this.openDay(active);
          document.getElementById('prev-month').onclick = () => {
            if (this.month === 0) { this.month = 11; this.year--; }
            else this.month--;
            this.render();
          };
          document.getElementById('next-month').onclick = () => {
            if (this.month === 11) { this.month = 0; this.year++; }
            else this.month++;
            this.render();
          };
        },

        _gardes() {
          return App.data.rotations.gardes || {};
        },

        render() {
          document.getElementById('mois-label').textContent =
            `${MOIS[this.month]} ${this.year}`;
          document.getElementById('calendrier-planning').innerHTML =
            buildCalendrierPlanning(this.year, this.month, this._gardes());
        },

        openDay(dateStr) {
          this._currentDay = dateStr;
          const d = new Date(dateStr + 'T12:00:00');
          const titre = d.toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
          document.getElementById('panel-jour-titre').textContent = titre;

          // Init pills type (single select)
          document.querySelectorAll('.garde-type-pill').forEach(b => {
            b.classList.remove('active');
            b.onclick = () => {
              const was = b.classList.contains('active');
              document.querySelectorAll('.garde-type-pill').forEach(x => x.classList.remove('active'));
              if (!was) b.classList.add('active');
            };
          });
          // Init pills rôle (single select, toggleable)
          document.querySelectorAll('.garde-role-pill').forEach(b => {
            b.classList.remove('active');
            b.onclick = () => {
              const was = b.classList.contains('active');
              document.querySelectorAll('.garde-role-pill').forEach(x => x.classList.remove('active'));
              if (!was) b.classList.add('active');
            };
          });

          this._populateAgentSelect();
          document.getElementById('search-agent-planning').value = '';
          document.getElementById('btn-open-add').classList.remove('hidden');
          this.renderDayList();

          // Highlight jour sélectionné dans le calendrier
          document.querySelectorAll('[data-datestr]').forEach(el => {
            el.classList.toggle('ring-2', el.dataset.datestr === dateStr);
            el.classList.toggle('ring-sag-gold', el.dataset.datestr === dateStr);
          });
        },

        _populateAgentSelect(filter = '') {
          const sel = document.getElementById('select-agent-planning');
          const q   = filter.toLowerCase();
          const list = App.data.personnel
            .filter(p => p.actif !== false)
            .filter(p => !q || `${p.nom} ${p.prenom} ${p.grade}`.toLowerCase().includes(q))
            .sort((a, b) => a.nom.localeCompare(b.nom));
          sel.innerHTML = list.map(p =>
            `<option value="${p.id}">${p.nom} ${p.prenom} — ${p.grade}</option>`
          ).join('');
        },

        filterAgents() {
          this._populateAgentSelect(document.getElementById('search-agent-planning').value);
        },

        renderDayList() {
          const aff  = (this._gardes()[this._currentDay] || []);
          const countEl = document.getElementById('panel-jour-count');
          if (countEl) countEl.textContent = aff.length ? `${aff.length} agent${aff.length > 1 ? 's' : ''} affecté${aff.length > 1 ? 's' : ''}` : '';

          // Récapitulatif par type
          const recapEl = document.getElementById('recap-types');
          const recapIn = document.getElementById('recap-types-inner');
          if (recapEl && recapIn) {
            if (aff.length) {
              const counts = {};
              aff.forEach(a => { counts[a.type] = (counts[a.type]||0)+1; });
              recapIn.innerHTML = GARDE_TYPES
                .filter(t => counts[t.val])
                .map(t => `<div class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg" style="background:${t.bg}20;border:1px solid ${t.bg}40">
                  <span class="w-2 h-2 rounded-full shrink-0" style="background:${t.bg}"></span>
                  <span class="text-xs font-semibold" style="color:${t.bg}">${t.val}</span>
                  <span class="text-xs font-bold text-gray-700">${counts[t.val]}</span>
                </div>`)
                .join('');
              recapEl.classList.remove('hidden');
            } else {
              recapEl.classList.add('hidden');
            }
          }

          const el = document.getElementById('jour-liste');
          if (!aff.length) {
            el.innerHTML = `<p class="text-gray-300 text-sm text-center py-8">Aucune affectation pour ce jour</p>`;
            return;
          }
          el.innerHTML = aff.map((a, i) => {
            const p    = App.data.personnel.find(x => String(x.id) === String(a.agentId));
            const name = p ? `${p.nom} ${p.prenom}` : `Agent #${a.agentId}`;
            const img  = p && GRADE_IMG[p.grade]
              ? `<div class="w-8 h-8 rounded-full bg-sag-navy flex items-center justify-center shrink-0">
                   <img src="assets/grades/${GRADE_IMG[p.grade]}.webp" style="width:22px;height:22px;object-fit:contain"/>
                 </div>`
              : `<div class="w-8 h-8 rounded-full bg-sag-navy flex items-center justify-center shrink-0 text-sag-gold text-xs font-bold">
                   ${p ? (p.prenom[0]+p.nom[0]) : '?'}
                 </div>`;
            const tm = gardeTypeMeta(a.type);
            const typeBadge = `<span class="px-2 py-0.5 rounded text-xs font-bold" style="background:${tm.bg};color:${tm.color}">${a.type}</span>`;
            const roleBadge = a.role ? `<span class="px-2 py-0.5 rounded text-xs font-semibold bg-slate-100 text-slate-600">${a.role}</span>` : '';
            return `<div class="flex items-center gap-2 p-2 rounded-lg bg-gray-50 hover:bg-gray-100 transition-colors">
              ${img}
              <span class="text-sm font-medium text-gray-800 flex-1 min-w-0 truncate">${name}</span>
              ${typeBadge}
              ${roleBadge}
              <button onclick="App.pages.planning.removeAffectation(${i})"
                      class="text-gray-300 hover:text-red-400 transition-colors p-1 rounded shrink-0">
                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                </svg>
              </button>
            </div>`;
          }).join('');
        },

        openAddModal() {
          const d = new Date(this._currentDay + 'T12:00:00');
          document.getElementById('modal-add-titre').textContent =
            d.toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long' });
          document.querySelectorAll('.garde-type-pill, .garde-role-pill').forEach(b => b.classList.remove('active'));
          document.getElementById('search-agent-planning').value = '';
          this._populateAgentSelect();
          document.getElementById('modal-add-agent').classList.remove('hidden');
        },

        async addAffectation() {
          const sel  = document.getElementById('select-agent-planning');
          const agentId = sel.value;
          if (!agentId) { Toast.show('Sélectionnez un agent', 'err'); return; }
          const typeEl = document.querySelector('.garde-type-pill.active');
          if (!typeEl) { Toast.show('Sélectionnez un type de garde', 'err'); return; }
          const type = typeEl.dataset.value;
          const roleEl = document.querySelector('.garde-role-pill.active');
          const role = roleEl ? roleEl.dataset.value : null;

          const rot = App.data.rotations;
          if (!rot.gardes) rot.gardes = {};
          if (!rot.gardes[this._currentDay]) rot.gardes[this._currentDay] = [];
          rot.gardes[this._currentDay].push({ agentId, type, role });

          await API.save('rotations.json', rot);
          document.getElementById('modal-add-agent').classList.add('hidden');
          this.renderDayList();
          this.render();
          Toast.show('Agent ajouté');
        },

        async removeAffectation(idx) {
          const rot = App.data.rotations;
          if (!rot.gardes?.[this._currentDay]) return;
          rot.gardes[this._currentDay].splice(idx, 1);
          if (!rot.gardes[this._currentDay].length) delete rot.gardes[this._currentDay];
          await API.save('rotations.json', rot);
          this.renderDayList();
          this.render();
          Toast.show('Affectation supprimée');
        },
      },

      // ── Personnel / Ressources humaines ────────────────
      personnel: {
        _filtered: [],

        _calcAge(ddn) {
          if (!ddn) return null;
          const today = new Date();
          const birth = new Date(ddn);
          let age = today.getFullYear() - birth.getFullYear();
          const m = today.getMonth() - birth.getMonth();
          if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) age--;
          return age >= 0 ? age : null;
        },

        _calcFacteur(age) {
          if (age === null || age < 0) return null;
          if (age < 20)  return '0.90';
          if (age < 30)  return '1.00';
          if (age < 40)  return '1.05';
          if (age <= 50) return '1.10';
          if (age <= 60) return '1.15';
          return '1.20';
        },

        updateGradePreview() {
          const grade = document.getElementById('pers-grade').value;
          const box   = document.getElementById('pers-grade-preview');
          if (!box) return;
          const key = GRADE_IMG[grade];
          box.innerHTML = key
            ? `<img src="assets/grades/${key}.webp" alt="${grade}" style="width:36px;height:36px;object-fit:contain" onerror="this.parentElement.innerHTML='<span class=text-gray-300 text-xs>—</span>'"/>`
            : `<span class="text-gray-200 text-xs">—</span>`;
        },

        updateAgeDisplay() {
          const ddn = document.getElementById('pers-ddn').value;
          const age = this._calcAge(ddn);
          const facteur = this._calcFacteur(age);
          document.getElementById('pers-age-display').textContent = age !== null ? `${age} ans` : '—';
          document.getElementById('pers-facteur-display').textContent = facteur !== null ? facteur : '—';
        },

        init() {
          // Peupler le filtre groupe
          const filterGr = document.getElementById('filter-groupe');
          filterGr.innerHTML = '<option value="">Tous les groupes</option>' +
            (App.data.equipes || []).map(e =>
              `<option value="${e.code}">${e.nom}</option>`
            ).join('');

          // Peupler le select groupe du modal
          const selGr = document.getElementById('pers-groupe');
          if (selGr) {
            selGr.innerHTML = (App.data.equipes || []).map(e =>
              `<option value="${e.code}">${e.nom}</option>`
            ).join('');
          }

          // Peupler les UV du modal
          const uvGroup = document.getElementById('pers-uv-group');
          if (uvGroup) {
            uvGroup.innerHTML = (App.data.uv || []).map(u =>
              `<button type="button" class="pers-uv-pill pill-tag" data-value="${u.code}" title="${u.libelle}">${u.code}</button>`
            ).join('');
            uvGroup.querySelectorAll('.pers-uv-pill').forEach(btn =>
              btn.addEventListener('click', () => btn.classList.toggle('active'))
            );
          }

          // Sélection unique pour les fonctions
          document.querySelectorAll('.pers-fonction-pill').forEach(btn =>
            btn.addEventListener('click', () => {
              const wasActive = btn.classList.contains('active');
              document.querySelectorAll('.pers-fonction-pill').forEach(b => b.classList.remove('active'));
              if (!wasActive) btn.classList.add('active');
            })
          );

          this._filtered = [...App.data.personnel];
          this.renderTable(this._filtered);
          document.getElementById('count-personnel').textContent =
            `${App.data.personnel.length} enregistré(s)`;
        },

        filter() {
          const q  = document.getElementById('search-personnel').value.toLowerCase();
          const gr = document.getElementById('filter-groupe').value;
          const st = document.getElementById('filter-statut').value;
          this._filtered = App.data.personnel.filter(p => {
            const matchQ  = !q || `${p.nom} ${p.prenom} ${p.grade}`.toLowerCase().includes(q);
            const matchGr = !gr || p.groupe === gr;
            const matchSt = !st || p.statut === st;
            return matchQ && matchGr && matchSt;
          });
          this.renderTable(this._filtered);
          document.getElementById('count-personnel').textContent =
            `${this._filtered.length} / ${App.data.personnel.length}`;
        },

        renderTable(list) {
          const tbody = document.getElementById('table-personnel');
          if (!list.length) {
            tbody.innerHTML = `<tr><td colspan="8" class="text-center py-8 text-gray-300">Aucun résultat</td></tr>`;
            return;
          }
          tbody.innerHTML = list.map(p => {
            const age     = this._calcAge(p.ddn);
            const facteur = this._calcFacteur(age);
            const fonctions = p.fonctions
              ? `<span class="px-1.5 py-0.5 rounded text-xs font-medium bg-blue-50 text-blue-700">${p.fonctions}</span>`
              : '';
            const statutColor = p.statut === 'SPP' ? 'bg-orange-100 text-orange-700' : 'bg-sky-100 text-sky-700';
            return `
            <tr class="border-b border-gray-50 hover:bg-gray-50 transition-colors">
              <td class="px-4 py-3 font-medium text-gray-800">
                <div class="flex items-center gap-2">
                  <div class="w-9 h-9 rounded-full bg-sag-navy flex items-center justify-center shrink-0 overflow-hidden">
                    ${GRADE_IMG[p.grade]
                      ? `<img src="assets/grades/${GRADE_IMG[p.grade]}.webp" alt="${p.grade}" title="${p.grade}" style="width:28px;height:28px;object-fit:contain"/>`
                      : `<span class="text-sag-gold text-xs font-bold">${(p.prenom||'?')[0]}${(p.nom||'?')[0]}</span>`
                    }
                  </div>
                  ${p.nom} ${p.prenom}
                </div>
              </td>
              <td class="px-4 py-3">${badgeGroupe(p.groupe)}</td>
              <td class="px-4 py-3">
                ${p.statut ? `<span class="px-2 py-0.5 rounded-full text-xs font-semibold ${statutColor}">${p.statut}</span>` : '<span class="text-gray-300 text-xs">—</span>'}
              </td>
              <td class="px-4 py-3 hidden md:table-cell">${fonctions || '<span class="text-gray-300 text-xs">—</span>'}</td>
              <td class="px-4 py-3 hidden lg:table-cell">
                <div class="flex flex-wrap gap-1">${renderUV(p.uv)}</div>
              </td>
              <td class="px-4 py-3 text-gray-600 hidden md:table-cell">${age !== null ? `${age} ans` : '<span class="text-gray-300">—</span>'}</td>
              <td class="px-4 py-3 font-medium hidden md:table-cell ${facteur ? 'text-gray-700' : 'text-gray-300'}">${facteur || '—'}</td>
              <td class="px-4 py-3">
                <div class="flex items-center gap-1 justify-end">
                  <button onclick="App.pages.personnel.openEdit('${p.id}')"
                          class="p-1.5 text-gray-300 hover:text-sag-gold rounded transition-colors">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                    </svg>
                  </button>
                  <button onclick="App.pages.personnel.delete('${p.id}')"
                          class="p-1.5 text-gray-300 hover:text-red-400 rounded transition-colors">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                    </svg>
                  </button>
                </div>
              </td>
            </tr>`;
          }).join('');
        },

        _resetModal() {
          document.getElementById('pers-id').value = '';
          document.getElementById('pers-nom').value = '';
          document.getElementById('pers-prenom').value = '';
          document.getElementById('pers-grade').value = '';
          this.updateGradePreview();
          document.getElementById('pers-groupe').value = '';
          document.getElementById('pers-ddn').value = '';
          document.getElementById('pers-statut').value = '';
          document.getElementById('pers-actif').checked = true;
          document.querySelectorAll('.pers-fonction-pill').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.pers-uv-pill').forEach(b => b.classList.remove('active'));
          document.getElementById('pers-age-display').textContent = '—';
          document.getElementById('pers-facteur-display').textContent = '—';
        },

        openAdd() {
          document.getElementById('modal-pers-title').textContent = 'Nouvel agent';
          this._resetModal();
          document.getElementById('modal-personnel').classList.remove('hidden');
        },

        openEdit(id) {
          const p = App.data.personnel.find(x => String(x.id) === String(id));
          if (!p) return;
          document.getElementById('modal-pers-title').textContent = 'Modifier agent';
          this._resetModal();
          document.getElementById('pers-id').value = id;
          document.getElementById('pers-nom').value = p.nom;
          document.getElementById('pers-prenom').value = p.prenom;
          document.getElementById('pers-grade').value = p.grade;
          this.updateGradePreview();
          document.getElementById('pers-groupe').value = p.groupe;
          document.getElementById('pers-ddn').value = p.ddn || '';
          document.getElementById('pers-statut').value = p.statut || 'SPV';
          document.getElementById('pers-actif').checked = p.actif;
          if (p.fonctions) {
            const btn = document.querySelector(`.pers-fonction-pill[data-value="${p.fonctions}"]`);
            if (btn) btn.classList.add('active');
          }
          (p.uv || []).forEach(u => {
            const btn = document.querySelector(`.pers-uv-pill[data-value="${u}"]`);
            if (btn) btn.classList.add('active');
          });
          this.updateAgeDisplay();
          document.getElementById('modal-personnel').classList.remove('hidden');
        },

        async save() {
          const id     = document.getElementById('pers-id').value;
          const nom    = document.getElementById('pers-nom').value.trim().toUpperCase();
          const prenom = document.getElementById('pers-prenom').value.trim();
          if (!nom || !prenom) { Toast.show('Nom et prénom requis', 'err'); return; }

          const fonctionEl = document.querySelector('.pers-fonction-pill.active');
          const fonctions  = fonctionEl ? fonctionEl.dataset.value : null;
          const uv        = [...document.querySelectorAll('.pers-uv-pill.active')].map(b => b.dataset.value);

          const entry = {
            id: id ? id : String(Date.now()),
            nom, prenom,

          if (id) {

          } else {
            App.data.personnel.push(entry);

        _setView(mode) {

        _applyViewMode() {

        _stepGarde(dir) {
          const list = this._gardesList;
          const idx  = list.indexOf(this._currentDate);
          const next = list[idx + dir];
          if (!next) return;
          this._currentDate = next;
          document.getElementById('itv-garde-date').value = next;
          this._updateNav();
          this._renderCurrent();

        _updateNav() {

          const label = document.getElementById('itv-date-label');
          const prev  = document.getElementById('itv-prev-btn');
          const next  = document.getElementById('itv-next-btn');
          if (!label) return;

          // Label lisible
          if (this._currentDate) {

          // Boutons actifs/désactivés
          if (prev) prev.disabled = idx <= 0;
          if (next) next.disabled = idx < 0 || idx >= list.length - 1;
        },

        _renderSummary(items) {

            const totalAgents = items.reduce((s, i) =>

            const byType = {};

              <span class="text-xs text-gray-400">${items.length} intervention${items.length > 1 ? 's' : ''}</span>
              <span class="text-gray-200">·</span>
              <span class="text-xs text-gray-400">${totalAgents} agent${totalAgents > 1 ? 's' : ''}</span>
              ${Object.entries(byType).map(([tid, n]) => {

        },

        _renderList() {
          const list = document.getElementById('itv-list');

          const items = (this._data.interventions || [])

                <div class="w-16 h-16 rounded-2xl bg-gray-100 flex items-center justify-center mb-4">
                  <svg class="w-8 h-8 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>

          list.innerHTML = items.map(i => {

            const aCount = vehs.reduce((s, v) => s + (v.equipage || []).filter(e => e.agentId).length, 0);

            const vehBlocks = vehs.map(v => {
              const agents = (v.equipage || []).filter(e => e.agentId).map(e => {

                return p ? `<span class="inline-flex items-center gap-1 text-xs bg-white border border-gray-200 text-gray-700 px-2 py-0.5 rounded-full">

                ${agents.length ? agents.join('') : '<span class="text-xs text-gray-300 italic self-center">Aucun agent</span>'}
              </div>`;
            }).join('');

            return `
              <div class="bg-white rounded-2xl border border-gray-100 shadow-sm hover:shadow-md hover:border-gray-200 transition-all cursor-pointer overflow-hidden"
                   onclick="App.pages.interventions._openModal('${i.id}')">
                <!-- En-tête coloré -->
                <div class="flex items-center gap-4 px-5 py-4 ${t ? t.color : 'bg-sag-navy'}">
                  <svg class="w-6 h-6 text-white/90 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    ${t ? t.icon : '<path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>'}
                  </svg>
                  <div class="flex-1 min-w-0">
                    <p class="text-white font-bold text-base font-mono leading-tight">${this._esc(i.numero || '—')}</p>
                    <p class="text-white/60 text-xs mt-0.5">${t ? t.label : 'Type non défini'} · ${aCount} agent${aCount > 1 ? 's' : ''} en intervention</p>
                  </div>
                  <div class="text-right shrink-0">
                    <p class="text-white font-bold text-lg font-mono">${this._esc(i.heure || '--:--')}</p>
                  </div>
                </div>
                <!-- Corps véhicules -->
                ${vehs.length ? `
                <div class="px-5 py-3 space-y-2 bg-white">
                  ${vehBlocks}
